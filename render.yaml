services:
  # 1. Node.js Backend
  - type: web
    name: ai-paper-server
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AI_SERVICE_URL
        value: http://ai-service:8000 # Using fixed port for internal networking

  # 2. Python AI Service
  - type: web
    name: ai-service
    env: python
    rootDir: ai_service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8000 # Force Render to use 8000 internally

  # 3. Frontend Static Site
  - type: web
    name: ai-paper-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    envVars:
      - key: VITE_API_URL
        value: https://ai-paper-server.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
